dimensions:
- tool_use: Correct tool selection, parameters, and sequencing.
  grading_type: score
  scores:
    0: Required tool not called or incorrect tool selected.
    1: Tool called with incorrect parameters or wrong order.
    2: Tool called correctly but call count outside expected bounds.
    3: All checks pass - correct count, order, and parameters.
- problem_diagnosis_accuracy: Root cause correctly identified from gathered information.
  grading_type: binary
- solution_appropriateness: Solution is technically sound, safe, and addresses the
    problem.
  grading_type: binary
- workflow_management: Task flow effectively managed (planning, executing, tracking
    progress).
  grading_type: score
  scores:
    0: No discernible plan or completely failed logical steps.
    1: Plan executed poorly with significant deviations or inefficiencies.
    2: Reasonable plan with minor inefficiencies or tracking inaccuracies.
    3: Clear, logical, efficient workflow with accurate progress tracking.
- communication_clarity: Clarity of actions, findings, and requests to user.
  grading_type: score
  scores:
    0: Unintelligible or no response.
    1: Poorly organized or difficult to understand.
    2: Generally clear but could be improved.
    3: Exceptionally clear and well-organized.
- task_completeness: All aspects of user's request fully addressed.
  grading_type: score
  scores:
    0: No relevant progress made.
    1: Only initial steps taken, most task unaddressed.
    2: Significant progress but didn't fully complete or verify solution.
    3: Fully completed with verification, or remaining steps clearly outlined.
criteria:
  ssh_config_examination_tool_call:
    category: Tools
    weight: 3
    dimension: tool_use
    criterion: Examine SSH daemon configuration file /etc/ssh/sshd_config.
  initial_permissions_diagnostic_tool_call:
    category: Tools
    weight: 3
    dimension: tool_use
    criterion: Check initial permissions and ownership of /home/testuser, /home/testuser/.ssh,
      and authorized_keys.
  accurate_initial_ssh_dir_permissions_identification:
    category: Accuracy
    weight: 2
    dimension: problem_diagnosis_accuracy
    criterion: Correctly identifies initial permissions of /home/testuser/.ssh as
      'drwxrwxrwx. 2 root root'.
  accurate_initial_authorized_keys_permissions_identification:
    category: Accuracy
    weight: 2
    dimension: problem_diagnosis_accuracy
    criterion: Correctly identifies initial permissions of authorized_keys as '-rw-r--r--.
      1 testuser root'.
  correct_problem_diagnosis:
    category: Reasoning
    weight: 3
    dimension: problem_diagnosis_accuracy
    criterion: Diagnoses root cause as incorrect permissions/ownership on /home/testuser/.ssh
      and authorized_keys.
  appropriate_fix_application_tool_call:
    category: Tools
    weight: 3
    dimension: tool_use
    criterion: Apply chown/chmod commands to fix .ssh (700) and authorized_keys (600,
      testuser:testuser).
  post_fix_permissions_verification_tool_call:
    category: Tools
    weight: 3
    dimension: tool_use
    criterion: Verify permissions/ownership of .ssh and authorized_keys after fix.
  accurate_post_fix_ssh_dir_permissions_verification:
    category: Accuracy
    weight: 2
    dimension: task_completeness
    criterion: Verifies .ssh permissions correctly set to 'drwx------. 2 testuser
      testuser'.
  accurate_post_fix_authorized_keys_permissions_verification:
    category: Accuracy
    weight: 2
    dimension: task_completeness
    criterion: Verifies authorized_keys permissions correctly set to '-rw-------. 1
      testuser testuser'.
  clear_final_user_instructions:
    category: Output
    weight: 2
    dimension: communication_clarity
    criterion: Provides clear final instructions to verify fix via SSH login and summarizes
      corrections.
