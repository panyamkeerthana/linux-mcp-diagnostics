variables:
  service_name: mariadb
  data_dir: /var/lib/mysql
  log_dir: /var/log/mariadb
  log_file: /var/log/mariadb/mariadb.log
  disk_hog_file: DISK_HOG
  correct_ownership: "mysql:mysql"
  error_code_disk: 28
  error_code_permission: 13

dimensions:
- first_diagnosis_accuracy:
    description: First root cause (disk space issue) correctly identified.
    grading_type: score
    scores:
      0: Failed to identify the disk space problem.
      1: Identified disk space but didn't locate the specific file.
      2: Identified disk space and located DISK_HOG file but missed details.
      3: Correctly identified disk full, located DISK_HOG in {{data_dir}} as cause.
- second_diagnosis_accuracy:
    description: Second root cause (permission issue) correctly identified
      after addressing the first.
    grading_type: score
    scores:
      0: Failed to identify the permission issue.
      1: Identified there's still a problem but didn't pinpoint permissions.
      2: Identified permission issue but didn't specify exact directory/owner.
      3: Correctly identified permission denied on {{log_dir}} needing {{correct_ownership}}
        ownership.
- sequential_troubleshooting:
    description: Logical sequential approach followed to diagnose and
      resolve both cascading issues.
    grading_type: score
    scores:
      0: No logical approach or completely random investigation.
      1: Attempted investigation but missed sequential nature of problems.
      2: Recognized multiple issues but didn't clearly sequence resolution steps.
      3: Clearly followed sequential approach - diagnose issue 1, fix it, diagnose issue
        2, fix it.
- solution_correctness:
    description: Both proposed solutions would resolve the cascading failures.
    grading_type: score
    scores:
      0: Solutions would not fix the problems.
      1: One solution correct but the other incorrect or missing.
      2: Both solutions generally correct but missing important details.
      3: Both solutions completely correct and would fully resolve both issues.
- solution_completeness:
    description: All necessary remediation steps for both issues included.
    grading_type: binary
- clarity_and_guidance:
    description: Readability, organization, and helpfulness of response.
    grading_type: score
    scores:
      0: No structure or actionable steps provided.
      1: Identifies issues but provides no actionable steps or commands to resolve them.
      2: Provides actionable steps but doesn't clearly separate the two cascading issues.
      3: Clearly separates both issues with specific actionable steps for each in sequence.
criteria:
  identified_disk_space_issue:
    category: Diagnosis - Issue 1
    weight: 4
    dimension: first_diagnosis_accuracy
    criterion: Identifies "No space left on device" error (Errcode {{error_code_disk}}) as first blocker
      preventing {{service_name}} from starting.
  identified_disk_hog_file:
    category: Diagnosis - Issue 1
    weight: 4
    dimension: first_diagnosis_accuracy
    criterion: Identifies {{disk_hog_file}} in {{data_dir}} as large file causing disk space
      issue.
  identified_permission_issue:
    category: Diagnosis - Issue 2
    weight: 4
    dimension: second_diagnosis_accuracy
    criterion: Identifies "Permission denied" error (errno {{error_code_permission}}) on {{log_file}}
      as second blocker.
  identified_incorrect_ownership:
    category: Diagnosis - Issue 2
    weight: 4
    dimension: second_diagnosis_accuracy
    criterion: Identifies {{log_dir}} has incorrect ownership (root:root instead
      of {{correct_ownership}}).
  sequential_problem_solving:
    category: Approach
    weight: 5
    dimension: sequential_troubleshooting
    criterion: Demonstrates sequential troubleshooting - investigate first issue, propose
      fix, then investigate why service still fails after addressing disk space.
  correct_disk_remediation:
    category: Remediation - Issue 1
    weight: 3
    dimension: solution_correctness
    criterion: Solution correctly addresses disk space by removing {{disk_hog_file}} from {{data_dir}}.
  correct_permission_remediation:
    category: Remediation - Issue 2
    weight: 3
    dimension: solution_correctness
    criterion: Solution correctly addresses permission by changing ownership of {{log_dir}}
      to {{correct_ownership}}.
  complete_resolution_steps:
    category: Completeness
    weight: 3
    dimension: solution_completeness
    criterion: Solution includes all steps - remove {{disk_hog_file}}, fix ownership, restart
      service.
  clear_guidance:
    category: Communication
    weight: 2
    dimension: clarity_and_guidance
    criterion: Provides clear, actionable guidance for resolving both cascading issues
      in correct order.
