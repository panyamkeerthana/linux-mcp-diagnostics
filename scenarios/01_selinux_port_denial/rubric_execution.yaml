variables:
  service_name: httpd
  target_port: 8088
  selinux_state: enforcing

dimensions:
- tool_use:
    description: Correct tool selection, ordering, and completeness.
    grading_type: score
    scores:
      0: Required tool not called or usage completely incorrect.
      1: Tool called with incorrect parameters or wrong order.
      2: Tool called correctly but call count outside min/max bounds.
      3: All checks pass - correct count, order, and parameters.
- diagnosis_accuracy:
    description: Root cause correctly identified.
    grading_type: binary
- fix_effectiveness:
    description: Solution successfully resolves the problem.
    grading_type: binary
- response_completeness:
    description: All requested information provided.
    grading_type: score
    scores:
      0: No relevant information provided.
      1: Missing most requested information.
      2: Some information provided but incomplete.
      3: All requested information provided.
- explanation_clarity:
    description: Clarity of diagnosis, fix, and verification explanations.
    grading_type: score
    scores:
      0: No explanation provided or completely incomprehensible.
      1: Missing explanations for diagnosis OR fix OR verification steps.
      2: All steps present but lack context (commands without explanation of purpose).
      3: Each step includes both commands and explanation of why it's needed.
- task_autonomy:
    description: Task completed without requiring additional user intervention
    grading_type: binary
criteria:
  initial_httpd_status_check:
    category: Tools
    weight: 3
    dimension: tool_use
    criterion: The assistant must effectively check the initial status of the {{service_name}}
      service, capturing both stdout and stderr, to diagnose the problem.
  check_port_listening:
    category: Tools
    weight: 2
    dimension: tool_use
    criterion: The assistant must check if any process is already listening on port
      {{target_port}}.
  selinux_diagnostic_tools:
    category: Tools
    weight: 3
    dimension: tool_use
    criterion: The assistant must use appropriate tools to diagnose SELinux status
      ('getenforce') and list configured http_port_t types ('semanage port -l').
  add_selinux_port_fix:
    category: Tools
    weight: 3
    dimension: tool_use
    criterion: The assistant must add TCP port {{target_port}} to the SELinux http_port_t
      type as part of the fix.
  start_httpd_service:
    category: Tools
    weight: 3
    dimension: tool_use
    criterion: The assistant must attempt to start the {{service_name}} service after
      applying the fix.
  final_httpd_status_verification:
    category: Tools
    weight: 3
    dimension: tool_use
    criterion: The assistant must verify the final running status of the {{service_name}}
      service after attempting to start it.
  correct_diagnosis_selinux_port:
    category: Reasoning
    weight: 3
    dimension: diagnosis_accuracy
    criterion: The diagnosis correctly identifies SELinux denying bind to port {{target_port}}
      as the root cause.
  fix_successfully_starts_service:
    category: Reasoning
    weight: 3
    dimension: fix_effectiveness
    criterion: The proposed solution successfully resolves the identified problem,
      confirmed by the {{service_name}} service running and listening on port {{target_port}}.
  response_includes_diagnosis_fix_verification:
    category: Completeness
    weight: from_scores
    dimension: response_completeness
    criterion: The final response clearly provides a diagnosis, a fix, and verification
      steps.
  explanation_is_clear_and_understandable:
    category: Output
    weight: from_scores
    dimension: explanation_clarity
    criterion: The diagnosis, fix, and verification steps are explained clearly and
      understandably to the user.
  completes_task_without_intervention:
    category: Autonomy
    weight: 3
    dimension: task_autonomy
    criterion: The assistant autonomously performs diagnosis, applies fixes, and verifies the solution without requiring additional user prompts to
      proceed.
