dimensions:
- diagnosis_accuracy: Root cause correctly identified.
  grading_type: score
  scores:
    0: Failed to identify the problem or completely incorrect diagnosis.
    1: Partially identified but missed the SELinux root cause.
    2: Identified SELinux but didn't fully explain the port binding problem.
    3: Correctly identified SELinux enforcing mode blocking port 8088 as root cause.
- solution_correctness: Proposed solutions would resolve the problem.
  grading_type: score
  scores:
    0: Solutions would not fix the problem or cause additional issues.
    1: Partially correct but incomplete or only partially resolves the issue.
    2: Would work but missing important details or best practices.
    3: Completely correct and would fully resolve the issue.
- solution_completeness: Solutions include all necessary steps for implementation.
  grading_type: binary
- factual_accuracy: All information provided is factually correct.
  grading_type: binary
- clarity_and_organization: Readability, structure, and presentation quality.
  grading_type: score
  scores:
    0: Unintelligible or completely unorganized.
    1: Difficult to understand or poorly structured.
    2: Generally clear and organized but could be improved.
    3: Exceptionally clear, well-structured, and easy to follow.
criteria:
  identifies_service_failure:
    category: Diagnosis
    weight: 2
    dimension: diagnosis_accuracy
    criterion: Identifies httpd service failed to start due to port binding issue.
  identifies_port_binding_denial:
    category: Diagnosis
    weight: 3
    dimension: diagnosis_accuracy
    criterion: Identifies permission denied error when binding to port 8088 as primary
      symptom.
  identifies_selinux_root_cause:
    category: Diagnosis
    weight: 5
    dimension: diagnosis_accuracy
    criterion: Identifies SELinux `{{selinux_state}}` mode as root cause preventing
      Apache from binding to port 8088.
  explains_selinux_port_policy:
    category: Diagnosis
    weight: 2
    dimension: diagnosis_accuracy
    criterion: Explains SELinux only allows HTTP services to bind to specific ports
      by default (e.g., 80, 443) and port 8088 is not allowed.
  provides_semanage_solution:
    category: Solution
    weight: 5
    dimension: solution_correctness
    criterion: Provides solution using `semanage port -a -t http_port_t -p tcp 8088`
      to add port 8088 to allowed HTTP ports.
  semanage_solution_complete:
    category: Solution
    weight: 3
    dimension: solution_completeness
    criterion: Semanage solution includes checking tool availability, correct command
      with parameters, and restarting service.
  provides_alternative_port_solution:
    category: Solution
    weight: 2
    dimension: solution_correctness
    criterion: Provides alternative to change Apache configuration to use standard
      port like 80 that SELinux allows by default.
  alternative_solution_complete:
    category: Solution
    weight: 2
    dimension: solution_completeness
    criterion: Alternative solution includes editing /etc/httpd/conf/httpd.conf,
      changing Listen directive, and restarting service.
  factual_accuracy_port_config:
    category: Accuracy
    weight: 2
    dimension: factual_accuracy
    criterion: Correctly states Apache is configured to listen on port 8088.
  factual_accuracy_selinux_state:
    category: Accuracy
    weight: 2
    dimension: factual_accuracy
    criterion: Correctly states SELinux is in `enforcing` mode.
  overall_clarity_and_organization:
    category: Output
    weight: from_scores
    dimension: clarity_and_organization
    criterion: from_scores
